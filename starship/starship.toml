# -----------------------------
# Starship (PS7) — Backend/DevOps-lite (no k8s)
# -----------------------------
add_newline = false
command_timeout = 700

format = """
$os$username$hostname$directory$git_branch$git_status$git_state$cmd_duration$time$status$jobs
$character"""

[character]
success_symbol = "❯ "
error_symbol = "❯ "
vimcmd_symbol = "❮ "

[time]
disabled = false
format = " [$time]($style)"
time_format = "%I:%M %p"
style = "dimmed"

# Show exit code if last command failed
[status]
disabled = false
format = " [$status]($style)"
style = "bold red"
map_symbol = true
pipestatus = true

[jobs]
symbol = "✦"
format = " [$symbol$number]($style)"
style = "dimmed"

# -----------------------------
# Directory
# -----------------------------
[directory]
truncation_length = 3
truncate_to_repo = true
home_symbol = "~"
read_only = " "
format = " [$path]($style)[$read_only]($style)"
style = "bold"

# -----------------------------
# Command duration
# -----------------------------
[cmd_duration]
min_time = 800
format = " [$duration]($style)"
style = "dimmed"

# -----------------------------
# Git
# -----------------------------
[git_branch]
symbol = " "
format = " on [$symbol$branch]($style)"
style = "bold"

[git_status]
format = "([$all_status$ahead_behind]($style))"
style = "bold"
conflicted = " "
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
untracked = "?"
stashed = "≡"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[git_state]
format = " [$state( $progress_current/$progress_total)]($style)"
style = "dimmed"

# -----------------------------
# Docker (only when relevant)
# -----------------------------
[docker_context]
format = " [docker $context]($style)"
style = "bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

# -----------------------------
# Identity bits
# -----------------------------
[username]
show_always = false
format = " [$user]($style)"
style_user = "dimmed"
style_root = "bold red"

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "dimmed"

[os]
disabled = false
format = "[$symbol]($style) "
style = "dimmed"

[os.symbols]
Windows = ""
Linux = ""
Macos = ""
